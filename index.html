<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
<title>Who's That Pokémon?</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #E3350D;
    --red-dark: #b82a0a;
    --red-glow: #E3350D44;
    --yellow: #FFCB05;
    --yellow-dark: #d4a800;
    --blue: #3B4CCA;
    --blue-light: #6378e0;
    --bg: #0f0f13;
    --bg2: #18181f;
    --bg3: #22222c;
    --bg4: #2c2c3a;
    --border: #35354a;
    --border-light: #4a4a60;
    --text: #f0f0f8;
    --text2: #9999bb;
    --text3: #5f5f7a;
    --success: #2ecc71;
    --success-bg: #0d2e1a;
    --danger: #e74c3c;
    --danger-bg: #2e0d0d;
    --radius: 6px;
    --radius-lg: 12px;
    --font-pixel: 'Press Start 2P', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, #1a0a3a 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
  }

  /* Header */
  .game-header {
    width: 100%;
    background: var(--bg2);
    border-bottom: 2px solid var(--red);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px #E3350D33;
  }
  .header-logo {
    font-family: var(--font-pixel);
    font-size: 10px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 var(--yellow-dark), 0 0 20px var(--yellow);
    letter-spacing: 1px;
    line-height: 1.6;
  }
  .header-logo span { color: var(--red); text-shadow: 2px 2px 0 var(--red-dark), 0 0 20px var(--red); }
  .header-dots {
    display: flex; gap: 6px; align-items: center;
  }
  .header-dot {
    width: 10px; height: 10px; border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .header-dot:nth-child(1) { background: var(--red); animation-delay: 0s; }
  .header-dot:nth-child(2) { background: var(--yellow); animation-delay: 0.3s; }
  .header-dot:nth-child(3) { background: var(--success); animation-delay: 0.6s; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* Main layout */
  .game-wrap {
    width: 100%; max-width: 700px;
    padding: 20px 16px 40px;
    flex: 1;
  }

  /* Loading screen */
  #loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; gap: 20px;
  }
  .load-pokeball {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(to bottom, var(--red) 50%, var(--bg3) 50%);
    border: 3px solid var(--border-light);
    position: relative;
    animation: spin 1.2s linear infinite;
    box-shadow: 0 0 30px var(--red-glow);
  }
  .load-pokeball::before {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 3px; background: var(--border-light); transform: translateY(-50%);
  }
  .load-pokeball::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--bg3); border: 3px solid var(--border-light);
    transform: translate(-50%, -50%);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #load-msg { font-family: var(--font-pixel); font-size: 9px; color: var(--text2); line-height: 1.8; text-align: center; }
  #load-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* Score bar */
  .score-bar {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 18px;
  }
  .score-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .score-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 60%, #ffffff04);
  }
  .slabel {
    font-family: var(--font-pixel);
    font-size: 6px; color: var(--text3);
    margin-bottom: 6px; letter-spacing: .08em;
    text-transform: uppercase;
  }
  .sval {
    font-family: var(--font-pixel);
    font-size: 14px; color: var(--text);
    line-height: 1;
  }
  .sval.red { color: var(--red); }
  .sval.yellow { color: var(--yellow); }
  .sval.blue { color: var(--blue-light); }

  /* Section label */
  .section-label {
    font-family: var(--font-pixel);
    font-size: 7px; color: var(--text3);
    letter-spacing: .1em; text-transform: uppercase;
    margin: 18px 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* Revealed hints */
  #revealed-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
  .revealed-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius);
    padding: 9px 12px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
  .revealed-label {
    font-size: 10px; color: var(--text3); white-space: nowrap;
    padding-top: 2px; display: flex; align-items: center; gap: 5px;
  }

  /* Hint buttons grid */
  #btn-grid {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 5px;
  }
  .hint-btn {
    padding: 9px 11px; font-size: 11px; cursor: pointer;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
    width: 100%; text-align: left;
    font-family: var(--font-body);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .hint-btn:hover:not(:disabled) { background: var(--bg3); border-color: var(--border-light); }
  .hint-btn:active:not(:disabled) { transform: scale(0.97); }
  .hint-btn:disabled { opacity: 0.3; cursor: default; }

  .cost-pill {
    font-size: 9px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
    font-family: var(--font-pixel);
  }
  .cost-low { background: #1a2e10; color: #7ec850; border: 1px solid #3a5a20; }
  .cost-mid { background: #2e1e10; color: #e8a040; border: 1px solid #5a3a20; }
  .cost-high { background: #2e1010; color: #e85050; border: 1px solid #5a2020; }

  /* Type pills */
  .type-pill {
    display: inline-block; padding: 2px 10px;
    border-radius: 20px; font-size: 11px; font-weight: 600;
    margin: 2px 2px 2px 0; text-transform: capitalize;
    letter-spacing: .03em;
  }
  .stat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .stat-bar-bg { background: var(--bg4); border-radius: 4px; height: 5px; flex: 1; min-width: 60px; }
  .stat-fill { height: 5px; border-radius: 4px; transition: width 0.4s ease; }

  /* Guess input */
  .input-wrap { position: relative; }
  #guess-input {
    width: 100%; padding: 11px 14px; font-size: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-family: var(--font-body);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  #guess-input:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 0 2px #FFCB0522;
  }
  #guess-input::placeholder { color: var(--text3); }

  #ac-list {
    background: var(--bg2); border: 1px solid var(--border-light);
    border-radius: var(--radius); margin-top: 3px;
    display: none; max-height: 160px; overflow-y: auto;
    position: absolute; width: 100%; z-index: 10;
    box-shadow: 0 8px 24px #00000066;
  }
  .ac-item {
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    color: var(--text); font-family: var(--font-body);
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: var(--bg3); }

  .guess-actions {
    display: grid; grid-template-columns: 1fr auto;
    gap: 6px; margin-top: 7px;
  }

  .btn-submit {
    padding: 10px 16px; font-size: 12px; cursor: pointer;
    border-radius: var(--radius);
    border: 1px solid var(--yellow);
    background: linear-gradient(135deg, #2a2000, #1a1500);
    color: var(--yellow);
    font-family: var(--font-pixel);
    letter-spacing: .05em;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-submit:hover { background: linear-gradient(135deg, #3a3000, #2a2000); box-shadow: 0 0 12px #FFCB0533; }
  .btn-submit:active { transform: scale(0.97); }

  .btn-giveup {
    padding: 10px 16px; font-size: 11px; cursor: pointer;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text3);
    font-family: var(--font-body);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .btn-giveup:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  #guess-feedback {
    margin-top: 7px; font-size: 12px; min-height: 18px;
    text-align: center; font-family: var(--font-pixel);
    letter-spacing: .04em; line-height: 1.8;
  }

  /* Result */
  #result-area { display: none; margin-top: 18px; }
  #result-banner {
    border-radius: var(--radius-lg);
    padding: 24px 20px;
    text-align: center;
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  #result-banner.won {
    background: var(--success-bg);
    border-color: var(--success);
    box-shadow: 0 0 30px #2ecc7133;
  }
  #result-banner.lost {
    background: var(--danger-bg);
    border-color: var(--danger);
    box-shadow: 0 0 30px #e74c3c33;
  }
  #pksprite {
    width: 120px; height: 120px;
    image-rendering: pixelated;
    display: block; margin: 0 auto 10px;
    filter: drop-shadow(0 0 12px #ffffff44);
    animation: floatAnim 3s ease-in-out infinite;
  }
  @keyframes floatAnim { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  #result-name {
    font-family: var(--font-pixel); font-size: 14px;
    color: var(--text); margin-bottom: 6px; line-height: 1.6;
  }
  #result-score { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }

  .btn-new {
    padding: 11px 22px; font-size: 10px; cursor: pointer;
    border-radius: var(--radius);
    border: 1px solid var(--yellow);
    background: linear-gradient(135deg, #2a2000, #1a1500);
    color: var(--yellow);
    font-family: var(--font-pixel);
    letter-spacing: .06em;
    transition: background 0.15s, box-shadow 0.15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-new:hover { background: linear-gradient(135deg, #3a3000, #2a2000); box-shadow: 0 0 16px #FFCB0544; }

  .play-cry-btn {
    padding: 6px 14px; font-size: 11px; cursor: pointer;
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    background: var(--bg3); color: var(--text);
    font-family: var(--font-body);
    transition: background 0.15s;
  }
  .play-cry-btn:hover { background: var(--bg4); }

  /* Footer */
  .game-footer {
    width: 100%;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 14px 20px;
    margin-top: auto;
  }
  .footer-inner {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .footer-brand {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }
  .footer-brand img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    opacity: 0.9;
    transition: opacity 0.2s;
  }
  .footer-brand:hover img { opacity: 1; }
  .footer-brand-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: .01em;
    transition: color 0.2s;
  }
  .footer-brand-name span { color: #05bfee; }
  .footer-brand:hover .footer-brand-name { color: var(--text); }
  .footer-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .footer-legal {
    font-size: 10px;
    color: var(--text3);
    line-height: 1.5;
  }
  .footer-gh {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid var(--border-light);
    background: var(--bg3);
    font-size: 11px;
    color: var(--text2);
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .footer-gh:hover { border-color: #05bfee; color: #05bfee; background: #0d2229; }
  .footer-gh svg { flex-shrink: 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }
</style>
</head>
<body>

<header class="game-header">
  <div class="header-logo">
    WHO'S THAT<br><span>POKÉMON?</span>
  </div>
  <div class="header-dots">
    <div class="header-dot"></div>
    <div class="header-dot"></div>
    <div class="header-dot"></div>
  </div>
</header>

<div class="game-wrap">

  <div id="loading">
    <div class="load-pokeball"></div>
    <div id="load-msg">Fetching full Pokédex...</div>
    <div id="load-sub"></div>
  </div>

  <div id="game" style="display:none;">
    <div class="score-bar">
      <div class="score-card">
        <div class="slabel">Points used</div>
        <div class="sval red" id="pts">0</div>
      </div>
      <div class="score-card">
        <div class="slabel">Hints taken</div>
        <div class="sval yellow" id="hcount">0</div>
      </div>
      <div class="score-card">
        <div class="slabel">Wrong guesses</div>
        <div class="sval blue" id="wrongs">0</div>
      </div>
    </div>

    <div id="revealed-list"></div>

    <div class="section-label">Hints — click to reveal</div>
    <div id="btn-grid"></div>

    <div class="section-label" style="margin-top:20px;">Your guess</div>
    <div class="input-wrap">
      <input type="text" id="guess-input" placeholder="Type a Pokémon name..." autocomplete="off"/>
      <div id="ac-list"></div>
    </div>
    <div class="guess-actions">
      <button class="btn-submit" onclick="submitGuess()">⚡ Submit Guess</button>
      <button class="btn-giveup" onclick="giveUp()">Give up</button>
    </div>
    <div id="guess-feedback"></div>

    <div id="result-area">
      <div id="result-banner">
        <img id="pksprite" src="" alt=""/>
        <div id="result-name"></div>
        <div id="result-score"></div>
        <button class="btn-new" onclick="newGame()">▶ New Pokémon</button>
      </div>
    </div>
  </div>

</div>

<footer class="game-footer">
  <div class="footer-inner">
    <a href="https://github.com/litools-lab" target="_blank" rel="noopener" class="footer-brand">
      <img src="redlogo_trans.png" alt="LiTools logo"/>
      <span class="footer-brand-name">Li<span>Tools</span></span>
    </a>
    <div class="footer-right">
      <span class="footer-legal">Fan project · Not affiliated with Nintendo / Game Freak / The Pokémon Company</span>
      <a href="https://github.com/litools-lab/whos-that-pokemon" target="_blank" rel="noopener" class="footer-gh">

      </a>

</footer>

<script>
const TYPE_COLORS={normal:'#A8A77A',fire:'#EE8130',water:'#6390F0',electric:'#F7D02C',grass:'#7AC74C',ice:'#96D9D6',fighting:'#C22E28',poison:'#A33EA1',ground:'#E2BF65',flying:'#A98FF3',psychic:'#F95587',bug:'#A6B91A',rock:'#B6A136',ghost:'#735797',dragon:'#6F35FC',dark:'#705746',steel:'#B7B7CE',fairy:'#D685AD',stellar:'#40B5A5',unknown:'#68A090'};

const HINTS=[
  {id:'dex_number',label:'Pokédex number',cost:10,icon:'🔢'},
  {id:'type',label:'Type(s)',cost:12,icon:'🔥'},
  {id:'evolution_stage',label:'Evolution stage',cost:8,icon:'🌱'},
  {id:'weaknesses',label:'Type weaknesses',cost:9,icon:'⚠️'},
  {id:'resistances',label:'Type resistances',cost:9,icon:'🛡️'},
  {id:'scrambled',label:'Scrambled name',cost:8,icon:'🔀'},
  {id:'generation',label:'Generation',cost:7,icon:'📅'},
  {id:'color',label:'Pokédex color',cost:6,icon:'🎨'},
  {id:'shape',label:'Body shape',cost:6,icon:'🔷'},
  {id:'evo_method_to',label:'Evolution method (into this)',cost:7,icon:'🔄'},
  {id:'evo_method_from',label:'Evolution method (from this)',cost:7,icon:'➡️'},
  {id:'stats',label:'Full stat spread',cost:6,icon:'📈'},
  {id:'abilities',label:'Abilities',cost:6,icon:'✨'},
  {id:'region',label:'Region',cost:7,icon:'🗺️'},
  {id:'habitat',label:'Habitat',cost:5,icon:'🌿'},
  {id:'first_letter',label:'First letter',cost:5,icon:'🔤'},
  {id:'evo_count',label:'Evolution count',cost:5,icon:'⛓️'},
  {id:'bst',label:'Base stat total',cost:4,icon:'📊'},
  {id:'legendary',label:'Legendary status',cost:3,icon:'🏆'},
  {id:'egg_group',label:'Egg group(s)',cost:5,icon:'🥚'},
  {id:'height_weight',label:'Height & weight',cost:4,icon:'📏'},
  {id:'catch_rate',label:'Catch rate',cost:3,icon:'🎯'},
  {id:'base_friendship',label:'Base friendship',cost:3,icon:'💛'},
  {id:'growth_rate',label:'Growth rate',cost:3,icon:'📉'},
  {id:'gender_ratio',label:'Gender ratio',cost:4,icon:'⚥'},
  {id:'base_exp',label:'Base experience',cost:4,icon:'⭐'},
  {id:'ev_yield',label:'EV yield',cost:5,icon:'💪'},
  {id:'genus',label:'Species',cost:9,icon:'🏷️'},
  {id:'japanese_name',label:'Japanese name',cost:6,icon:'🇯🇵'},
  {id:'cry',label:'Cry (audio)',cost:12,icon:'🔊'},
  {id:'flavor',label:'Pokédex entry',cost:14,icon:'📖'},
  {id:'silhouette',label:'Silhouette',cost:20,icon:'👤'},
];

let startTime = 0;

function cpClass(c){
  if(c<=6)return'cost-low';
  if(c<=11)return'cost-mid';
  return'cost-high';
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function capWords(s){return s?s.split(/[-_ ]/).map(cap).join(' '):'';}

let pkData=null,pkSpecies=null,pkEvoChain=null,typeData={};
let usedPts=0,hintsTaken=0,wrongGuesses=0,revealed=new Set();
let allPokemon=[],totalCount=0;
let flavorHint = null;

async function fetchJSON(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadAllPokemon(){
  const res=await fetchJSON('https://pokeapi.co/api/v2/pokemon-species?limit=10000');
  totalCount=res.count;
  allPokemon=res.results;
  document.getElementById('load-sub').textContent=`${totalCount} Pokémon loaded`;
}

async function loadTypeChart(){
  const res=await fetchJSON('https://pokeapi.co/api/v2/type?limit=100');
  const types=res.results.map(t=>t.name).filter(t=>t!=='unknown'&&t!=='shadow');
  await Promise.all(types.map(async t=>{
    const td=await fetchJSON(`https://pokeapi.co/api/v2/type/${t}`);
    typeData[t]=td.damage_relations;
  }));
}

function calcDefenses(typeNames){
  const mult={};
  Object.keys(TYPE_COLORS).forEach(t=>mult[t]=1);
  typeNames.forEach(defType=>{
    const rel=typeData[defType];
    if(!rel)return;
    rel.double_damage_from?.forEach(t=>mult[t.name]=(mult[t.name]||1)*2);
    rel.half_damage_from?.forEach(t=>mult[t.name]=(mult[t.name]||1)*0.5);
    rel.no_damage_from?.forEach(t=>mult[t.name]=(mult[t.name]||1)*0);
  });
  return mult;
}

async function prepareFlavorHint() {
  const entries = pkSpecies.flavor_text_entries.filter(f => f.language.name === 'en');
  if (!entries.length) {
    flavorHint = { text: 'No entry found.', version: '' };
    return;
  }
  const randomEntry = entries[Math.floor(Math.random() * entries.length)];
  const text = randomEntry.flavor_text.replace(/\f|\n|\r/g, ' ').replace(new RegExp(pkSpecies.name, 'gi'), '___');
  const vData = await fetchJSON(randomEntry.version.url);
  const versionName = vData.names.find(n => n.language.name === 'en')?.name||capWords(vData.name);
  flavorHint = { text, version: versionName };
}

async function newGame(){
  document.getElementById('game').style.display='none';
  document.getElementById('loading').style.display='flex';
  document.getElementById('result-area').style.display='none';
  document.getElementById('revealed-list').innerHTML='';
  document.getElementById('guess-input').value='';
  document.getElementById('guess-feedback').textContent='';
  document.getElementById('ac-list').style.display='none';
  revealed=new Set();usedPts=0;hintsTaken=0;wrongGuesses=0;
  updateScores();

  try{
    if(!allPokemon.length){
      document.getElementById('load-msg').textContent='Fetching full Pokédex...';
      await Promise.all([loadAllPokemon(),loadTypeChart()]);
    }
    document.getElementById('load-msg').textContent='Loading a random Pokémon...';
    const pick=allPokemon[Math.floor(Math.random()*allPokemon.length)+1];
    pkSpecies=await fetchJSON(`https://pokeapi.co/api/v2/pokemon-species/${pick.name}`);
    const pkId=pkSpecies.id;
    pkData=await fetchJSON(`https://pokeapi.co/api/v2/pokemon/${pkId}`);
    pkEvoChain=await fetchJSON(pkSpecies.evolution_chain.url);
    await prepareFlavorHint();
    renderButtons();
    document.getElementById('loading').style.display='none';
    document.getElementById('game').style.display='block';
    startTime = Date.now();
  }catch(e){
    document.getElementById('load-msg').textContent='Error — retrying...';
    setTimeout(newGame,2000);
  }
}

function updateScores(){
  document.getElementById('pts').textContent=usedPts;
  document.getElementById('hcount').textContent=hintsTaken;
  document.getElementById('wrongs').textContent=wrongGuesses;
}

function renderButtons(){
  const grid=document.getElementById('btn-grid');
  grid.innerHTML='';
  HINTS.forEach(h=>{
    const btn=document.createElement('button');
    btn.className='hint-btn';
    btn.id='btn-'+h.id;
    btn.disabled=revealed.has(h.id);
    btn.innerHTML=`<span style="font-size:11px;">${h.icon} ${h.label}</span><span class="cost-pill ${cpClass(h.cost)}">-${h.cost}pts</span>`;
    btn.onclick=()=>revealHint(h);
    grid.appendChild(btn);
  });
}

function revealHint(h){
  if(revealed.has(h.id))return;
  revealed.add(h.id);
  usedPts+=h.cost;hintsTaken++;
  updateScores();
  document.getElementById('btn-'+h.id).disabled=true;
  const val=getHintHTML(h.id);
  const list=document.getElementById('revealed-list');
  const div=document.createElement('div');
  div.className='revealed-row';
  div.innerHTML=`<span class="revealed-label">${h.icon} ${h.label}</span><div style="text-align:right;flex:1;">${val}</div>`;
  list.prepend(div);
}

function typePill(name){
  const c=TYPE_COLORS[name]||'#888';
  return`<span class="type-pill" style="background:${c}25;color:${c};border:1px solid ${c}55;">${cap(name)}</span>`;
}

function getEvoStage(){
  const stages=[];
  function walk(node,depth,parent){
    stages.push({name:node.species.name,depth,detailsTo:node.evolution_details,children:node.evolves_to,parent});
    node.evolves_to.forEach(n=>walk(n,depth+1,node));
  }
  walk(pkEvoChain.chain,0,null);
  const myName=pkSpecies.name;
  const me=stages.find(s=>s.name===myName);
  const maxDepth=Math.max(...stages.map(s=>s.depth));
  return{stage:me?(me.depth+1):1,total:maxDepth+1,detailsTo:me?me.detailsTo:[],childrenNodes:me?me.children:[]};
}

function getHintHTML(id){
  const pk=pkData,sp=pkSpecies;
  switch(id){
    case 'dex_number':
      return`<span style="font-size:14px;font-weight:600;color:var(--text);">#${pk.id}</span>`;
    case 'generation':{
      const genNum=sp.generation.name.replace('generation-','').toUpperCase();
      return`<span style="font-size:13px;font-weight:600;color:var(--text);">Gen ${genNum}</span>`;
    }
    case 'legendary':{
      const status=sp.is_legendary?'Legendary':sp.is_mythical?'Mythical':'Regular Pokémon';
      const col=sp.is_legendary||sp.is_mythical?'var(--yellow)':'var(--text2)';
      return`<span style="font-size:13px;color:${col};font-weight:600;">${status}</span>`;
    }
    case 'color':
      return`<span style="font-size:13px;color:var(--text);">${capWords(sp.color.name)}</span>`;
    case 'shape':
      return`<span style="font-size:13px;color:var(--text);">${sp.shape?capWords(sp.shape.name):'Unknown'}</span>`;
    case 'evolution_stage':{
      const{stage,total}=getEvoStage();
      const labels=['','Basic','Stage 1','Stage 2','Stage 3'];
      return`<span style="font-size:13px;color:var(--text);">${labels[stage]||'Stage '+stage} (${stage}/${total}${total===1?' — standalone':''})</span>`;
    }
    case 'evo_method_to':{
      const{detailsTo}=getEvoStage();
      if(!detailsTo||!detailsTo.length)return`<span style="font-size:13px;color:var(--text2);">Base form — does not evolve from anything</span>`;
      const d=detailsTo[0];const parts=[];
      if(d.trigger?.name==='level-up'){if(d.min_level)parts.push(`Level ${d.min_level}`);else parts.push('Level up');}
      else if(d.trigger?.name==='use-item'&&d.item)parts.push(`Use ${capWords(d.item.name)}`);
      else if(d.trigger?.name==='trade')parts.push('Trade'+(d.held_item?` holding ${capWords(d.held_item.name)}`:''));
      else if(d.trigger)parts.push(capWords(d.trigger.name));
      if(d.min_happiness)parts.push(`High friendship (≥${d.min_happiness})`);
      if(d.time_of_day)parts.push(`During ${d.time_of_day}`);
      if(d.known_move)parts.push(`Knowing ${capWords(d.known_move.name)}`);
      if(d.location)parts.push(`At ${capWords(d.location.name)}`);
      if(d.held_item&&d.trigger?.name!=='trade')parts.push(`Holding ${capWords(d.held_item.name)}`);
      if(d.min_beauty)parts.push('High beauty');
      if(d.needs_overworld_rain)parts.push('In rain');
      if(d.turn_upside_down)parts.push('Turn console upside down');
      if(d.gender===1)parts.push('Female');if(d.gender===2)parts.push('Male');
      return`<span style="font-size:13px;color:var(--text);">${parts.join(' + ')||'Special condition'}</span>`;
    }
    case 'evo_method_from':{
      const{childrenNodes}=getEvoStage();
      if(!childrenNodes||!childrenNodes.length)return`<span style="font-size:13px;color:var(--text2);">Final form — does not evolve further</span>`;
      return childrenNodes.map(child=>{
        const details=child.evolution_details||[];
        if(!details.length)return`<span style="font-size:13px;color:var(--text2);">Special condition</span>`;
        const d=details[0];const parts=[];
        if(d.trigger?.name==='level-up'){if(d.min_level)parts.push(`Level ${d.min_level}`);else parts.push('Level up');}
        else if(d.trigger?.name==='use-item'&&d.item)parts.push(`Use ${capWords(d.item.name)}`);
        else if(d.trigger?.name==='trade')parts.push('Trade'+(d.held_item?` holding ${capWords(d.held_item.name)}`:''));
        else if(d.trigger)parts.push(capWords(d.trigger.name));
        if(d.min_happiness)parts.push(`High friendship (≥${d.min_happiness})`);
        if(d.time_of_day)parts.push(`During ${d.time_of_day}`);
        if(d.known_move)parts.push(`Knowing ${capWords(d.known_move.name)}`);
        if(d.location)parts.push(`At ${capWords(d.location.name)}`);
        if(d.held_item&&d.trigger?.name!=='trade')parts.push(`Holding ${capWords(d.held_item.name)}`);
        if(d.min_beauty)parts.push('High beauty');
        if(d.needs_overworld_rain)parts.push('In rain');
        if(d.turn_upside_down)parts.push('Turn console upside down');
        if(d.gender===1)parts.push('Female');if(d.gender===2)parts.push('Male');
        return`<span style="font-size:13px;color:var(--text);">${parts.join(' + ')||'Special condition'}</span>`;
      }).join('<br>');
    }
    case 'bst':{
      const bst=pk.stats.reduce((s,x)=>s+x.base_stat,0);
      return`<span style="font-size:15px;font-weight:700;color:var(--text);">${bst}</span>`;
    }
    case 'type':
      return pk.types.map(t=>typePill(t.type.name)).join('');
    case 'weaknesses':{
      const types=pk.types.map(t=>t.type.name);
      const mult=calcDefenses(types);
      const x4=Object.entries(mult).filter(([,v])=>v===4).map(([t])=>t);
      const x2=Object.entries(mult).filter(([,v])=>v===2).map(([t])=>t);
      let out='';
      if(x4.length)out+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">×4 </span>`+x4.map(typePill).join('')+'</div>';
      if(x2.length)out+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">×2 </span>`+x2.map(typePill).join('')+'</div>';
      return out||'<span style="font-size:13px;color:var(--text2);">No weaknesses</span>';
    }
    case 'resistances':{
      const types=pk.types.map(t=>t.type.name);
      const mult=calcDefenses(types);
      const quarter=Object.entries(mult).filter(([,v])=>v===0.25).map(([t])=>t);
      const half=Object.entries(mult).filter(([,v])=>v===0.5).map(([t])=>t);
      const immune=Object.entries(mult).filter(([,v])=>v===0).map(([t])=>t);
      let out='';
      if(immune.length)out+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">×0 </span>`+immune.map(typePill).join('')+'</div>';
      if(quarter.length)out+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">¼ </span>`+quarter.map(typePill).join('')+'</div>';
      if(half.length)out+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">½ </span>`+half.map(typePill).join('')+'</div>';
      return out||'<span style="font-size:13px;color:var(--text2);">No resistances or immunities</span>';
    }
    case 'stats':{
      const names={hp:'HP',attack:'Atk',defense:'Def','special-attack':'SpA','special-defense':'SpD',speed:'Spe'};
      return pk.stats.map(s=>{
        const pct=Math.round(s.base_stat/255*100);
        const col=s.base_stat>=100?'#7ec850':s.base_stat>=60?'#e8a040':'#e85050';
        return`<div class="stat-row"><span style="font-size:10px;color:var(--text3);min-width:26px;">${names[s.stat.name]||s.stat.name}</span><div class="stat-bar-bg"><div class="stat-fill" style="width:${pct}%;background:${col};"></div></div><span style="font-size:11px;min-width:24px;text-align:right;color:var(--text);">${s.base_stat}</span></div>`;
      }).join('');
    }
    case 'abilities':
      return pk.abilities.map(a=>`<span style="font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:3px 9px;display:inline-block;margin:2px;color:var(--text);">${capWords(a.ability.name)}${a.is_hidden?' <span style="font-size:9px;color:var(--text3);">(H)</span>':''}</span>`).join('');
    case 'egg_group':
      return sp.egg_groups.map(e=>`<span style="font-size:13px;color:var(--text);">${capWords(e.name)}</span>`).join(', ');
    case 'height_weight':
      return`<span style="font-size:13px;color:var(--text);">${(pk.height/10).toFixed(1)} m &nbsp;/&nbsp; ${(pk.weight/10).toFixed(1)} kg</span>`;
    case 'catch_rate':{
      const rate=sp.capture_rate;
      const pct=((rate/255)*100).toFixed(1);
      return`<span style="font-size:13px;color:var(--text);">${rate}/255 (~${pct}% at full HP)</span>`;
    }
    case 'base_friendship':
      return`<span style="font-size:13px;color:var(--text);">${sp.base_happiness??'—'}/255</span>`;
    case 'growth_rate':
      return`<span style="font-size:13px;color:var(--text);">${capWords(sp.growth_rate.name)}</span>`;
    case 'genus':{
      const en=sp.genera?.find(g=>g.language.name==='en');
      return`<span style="font-size:13px;color:var(--text);">${en?en.genus:'Unknown'}</span>`;
    }
    case 'region':{
      const romanMap={'i':1,'ii':2,'iii':3,'iv':4,'v':5,'vi':6,'vii':7,'viii':8,'ix':9};
      const rom=sp.generation.name.replace('generation-','');
      const gNum=romanMap[rom]||0;
      const regions={1:'Kanto',2:'Johto',3:'Hoenn',4:'Sinnoh',5:'Unova',6:'Kalos',7:'Alola',8:'Galar',9:'Paldea'};
      return`<span style="font-size:13px;color:var(--text);">${regions[gNum]||capWords(sp.generation.name)}</span>`;
    }
    case 'gender_ratio':{
      if(sp.gender_rate===-1)return`<span style="font-size:13px;color:var(--text);">Genderless</span>`;
      const femPct=Math.round(sp.gender_rate/8*100);
      return`<span style="font-size:13px;color:var(--text);">♂ ${100-femPct}% / ♀ ${femPct}%</span>`;
    }
    case 'cry':{
      const cryUrl=`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${pk.id}.ogg`;
      const legacyUrl=`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/legacy/${pk.id}.ogg`;
      const btnId='cry-btn-'+pk.id;
      setTimeout(()=>{
        const btn=document.getElementById(btnId);
        if(btn)btn.onclick=()=>{
          btn.textContent='Playing...';
          const a=new Audio(cryUrl);
          a.play().catch(()=>{const b=new Audio(legacyUrl);b.play().catch(()=>{btn.textContent='No cry available';});b.onended=()=>{btn.textContent='▶ Play again';};});
          a.onended=()=>{btn.textContent='▶ Play again';};
        };
      },100);
      return`<button class="play-cry-btn" id="${btnId}">🔊 Play cry</button>`;
    }
    case 'habitat':
      return`<span style="font-size:13px;color:var(--text);">${sp.habitat?capWords(sp.habitat.name):'<span style="color:var(--text3);">Not recorded in Pokédex</span>'}</span>`;
    case 'base_exp':
      return`<span style="font-size:13px;color:var(--text);">${pk.base_experience??'—'} XP</span>`;
    case 'ev_yield':{
      const yields=pk.stats.filter(s=>s.effort>0).map(s=>`+${s.effort} ${({hp:'HP',attack:'Atk',defense:'Def','special-attack':'SpA','special-defense':'SpD',speed:'Spe'})[s.stat.name]||s.stat.name}`);
      return`<span style="font-size:13px;color:var(--text);">${yields.join(', ')||'None'}</span>`;
    }
    case 'flavor':
      return`<span style="font-size:12px;color:var(--text);font-style:italic;line-height:1.6;">(${flavorHint.version}) "${flavorHint.text}"</span>`;
    case 'silhouette':{
      const img=pk.sprites.other?.['official-artwork']?.front_default||pk.sprites.front_default;
      return`<img src="${img}" style="width:100px;image-rendering:pixelated;filter:brightness(0) invert(1);opacity:0.9;">`;
    }
    case 'japanese_name':{
      const jaName=pkSpecies.names?.find(n=>n.language.name==='ja')?.name||'—';
      const romajiName=pkSpecies.names?.find(n=>n.language.name==='ja-roma')?.name||'';
      return`<span style="font-size:16px;letter-spacing:.05em;color:var(--text);">${jaName}</span>${romajiName?` <span style="font-size:12px;color:var(--text3);">(${romajiName})</span>`:''}`;
    }
    case 'first_letter':
      return`<span style="font-size:14px;font-weight:600;">${pkSpecies.name[0].toUpperCase()}</span>`;
    case 'scrambled':{
      const name=pkSpecies.name;
      const shuffled=name.split('').sort(()=>Math.random()-0.5).join('');
      return`<span>${shuffled}</span>`;
    }
    case 'evo_count':{
      let count=0;
      function walk(node){
        if(node.evolves_to.length){count+=node.evolves_to.length;node.evolves_to.forEach(walk);}
      }
      walk(pkEvoChain.chain);
      return`<span>${count} evolution(s) in chain</span>`;
    }
    default:return'—';
  }
}

function submitGuess(){
  const val=document.getElementById('guess-input').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!val)return;
  const correctName=pkData.name.toLowerCase();
  const correctDisplay=pkSpecies.names?.find(n=>n.language.name==='en')?.name||cap(pkData.name);
  const fb=document.getElementById('guess-feedback');
  if(val===correctName||val===correctDisplay.toLowerCase()){
    showResult(true,correctDisplay);
  }else{
    wrongGuesses++;updateScores();
    fb.style.color='var(--danger)';
    fb.textContent='✗ Not quite! Try again.';
    setTimeout(()=>{fb.textContent='';},2200);
  }
}

function giveUp(){
  const correctDisplay=pkSpecies.names?.find(n=>n.language.name==='en')?.name||cap(pkData.name);
  showResult(false,correctDisplay);
}

function showResult(won,correctDisplay){
  const banner=document.getElementById('result-banner');
  const sprite=document.getElementById('pksprite');
  sprite.src=pkData.sprites.other?.['official-artwork']?.front_default||pkData.sprites.front_default||'';
  document.getElementById('result-name').textContent=correctDisplay+(won?'':' (you gave up)');
  let rating='';
  if(!won){
    rating='Better luck next time!';
    document.getElementById('result-score').textContent=rating;
  } else {
    const timeTaken=(Date.now()-startTime)/1000;
    let hintPenalty=usedPts*10;
    let wrongPenalty=0;
    for(let i=1;i<=wrongGuesses;i++){wrongPenalty+=i*25;}
    const timePenalty=Math.min(timeTaken*2,200);
    let efficiencyBonus=0;
    if(hintsTaken===0)efficiencyBonus+=200;
    else if(hintsTaken<=2)efficiencyBonus+=120;
    else if(hintsTaken<=4)efficiencyBonus+=60;
    let riskBonus=0;
    if(wrongGuesses===0)riskBonus+=100;
    else if(wrongGuesses===1)riskBonus+=50;
    const finalScore=Math.max(0,1000-hintPenalty-wrongPenalty-timePenalty+efficiencyBonus+riskBonus);
    if(finalScore>=900)rating='🏆 Master Trainer';
    else if(finalScore>=750)rating='🔥 Elite Four';
    else if(finalScore>=600)rating='⚡ Gym Leader';
    else if(finalScore>=450)rating='👍 Trainer';
    else rating='🌱 Beginner';
    document.getElementById('result-score').textContent=`Score: ${Math.round(finalScore)} · ${hintsTaken} hints · ${wrongGuesses} wrong · ${Math.round(timeTaken)}s · ${rating}`;
  }
  banner.className='';
  banner.id='result-banner';
  banner.classList.add(won?'won':'lost');
  document.getElementById('result-area').style.display='block';
  document.getElementById('guess-feedback').textContent='';
}

const gInput=document.getElementById('guess-input');
const acList=document.getElementById('ac-list');
gInput.addEventListener('input',()=>{
  const q=gInput.value.toLowerCase().replace(/\s+/g,'-');
  acList.innerHTML='';
  if(!q||q.length<2){acList.style.display='none';return;}
  const matches=allPokemon.filter(p=>p.name.startsWith(q)).slice(0,7);
  if(!matches.length){acList.style.display='none';return;}
  matches.forEach(m=>{
    const d=document.createElement('div');
    d.className='ac-item';
    d.textContent=capWords(m.name);
    d.onclick=()=>{gInput.value=capWords(m.name);acList.style.display='none';};
    acList.appendChild(d);
  });
  acList.style.display='block';
});
gInput.addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});
document.addEventListener('click',e=>{if(!gInput.contains(e.target)&&!acList.contains(e.target))acList.style.display='none';});

newGame();
</script>
