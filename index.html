<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
<title>Who's That Pokémon?</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #E3350D; --red-dark: #b82a0a; --red-glow: #E3350D44;
    --yellow: #FFCB05; --yellow-dark: #d4a800;
    --blue: #3B4CCA; --blue-light: #6378e0;
    --bg: #0f0f13; --bg2: #18181f; --bg3: #22222c; --bg4: #2c2c3a;
    --border: #35354a; --border-light: #4a4a60;
    --text: #f0f0f8; --text2: #9999bb; --text3: #5f5f7a;
    --success: #2ecc71; --success-bg: #0d2e1a;
    --danger: #e74c3c; --danger-bg: #2e0d0d;
    --radius: 6px; --radius-lg: 12px;
    --font-pixel: 'Press Start 2P', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, #1a0a3a 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
  }
  .game-header {
    width: 100%; background: var(--bg2); border-bottom: 2px solid var(--red);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px #E3350D33;
  }
  .header-logo {
    font-family: var(--font-pixel); font-size: 10px; color: var(--yellow);
    text-shadow: 2px 2px 0 var(--yellow-dark), 0 0 20px var(--yellow);
    letter-spacing: 1px; line-height: 1.6;
  }
  .header-logo span { color: var(--red); text-shadow: 2px 2px 0 var(--red-dark), 0 0 20px var(--red); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .lang-select-wrap { position: relative; }
  .lang-btn {
    background: var(--bg3); border: 1px solid var(--border-light); border-radius: var(--radius);
    color: var(--text); font-family: var(--font-body); font-size: 13px;
    padding: 6px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s; white-space: nowrap;
  }
  .lang-btn:hover { background: var(--bg4); border-color: var(--yellow); }
  .lang-btn .lang-arrow { font-size: 9px; color: var(--text3); }
  .lang-dropdown {
    position: absolute; right: 0; top: calc(100% + 6px);
    background: var(--bg2); border: 1px solid var(--border-light);
    border-radius: var(--radius); min-width: 150px;
    box-shadow: 0 8px 24px #00000088; display: none; z-index: 200; overflow: hidden;
  }
  .lang-dropdown.open { display: block; }
  .lang-option {
    padding: 9px 14px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; color: var(--text);
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .lang-option:last-child { border-bottom: none; }
  .lang-option:hover { background: var(--bg3); }
  .lang-option.active { color: var(--yellow); }
  .lang-option .lang-native { font-size: 11px; color: var(--text3); }
  .header-dots { display: flex; gap: 6px; align-items: center; }
  .header-dot { width: 10px; height: 10px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  .header-dot:nth-child(1) { background: var(--red); animation-delay: 0s; }
  .header-dot:nth-child(2) { background: var(--yellow); animation-delay: 0.3s; }
  .header-dot:nth-child(3) { background: var(--success); animation-delay: 0.6s; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .game-wrap { width: 100%; max-width: 700px; padding: 20px 16px 40px; flex: 1; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 20px; }
  .load-pokeball {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(to bottom, var(--red) 50%, var(--bg3) 50%);
    border: 3px solid var(--border-light); position: relative;
    animation: spin 1.2s linear infinite; box-shadow: 0 0 30px var(--red-glow);
  }
  .load-pokeball::before { content:''; position:absolute; top:50%; left:0; right:0; height:3px; background:var(--border-light); transform:translateY(-50%); }
  .load-pokeball::after { content:''; position:absolute; top:50%; left:50%; width:14px; height:14px; border-radius:50%; background:var(--bg3); border:3px solid var(--border-light); transform:translate(-50%,-50%); }
  @keyframes spin { to { transform: rotate(360deg); } }
  #load-msg { font-family: var(--font-pixel); font-size: 9px; color: var(--text2); line-height: 1.8; text-align: center; }
  #load-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .score-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
  .score-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; text-align: center; position: relative; overflow: hidden; }
  .score-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, transparent 60%, #ffffff04); }
  .slabel { font-family: var(--font-pixel); font-size: 6px; color: var(--text3); margin-bottom: 6px; letter-spacing: .08em; text-transform: uppercase; }
  .sval { font-family: var(--font-pixel); font-size: 14px; color: var(--text); line-height: 1; }
  .sval.red { color: var(--red); } .sval.yellow { color: var(--yellow); } .sval.blue { color: var(--blue-light); }
  .section-label { font-family: var(--font-pixel); font-size: 7px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin: 18px 0 8px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(to right, var(--border), transparent); }
  #revealed-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
  .revealed-row { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: var(--radius); padding: 9px 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; animation: slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .revealed-label { font-size: 10px; color: var(--text3); white-space: nowrap; padding-top: 2px; display: flex; align-items: center; gap: 5px; }
  #btn-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px; }
  .hint-btn { padding: 9px 11px; font-size: 11px; cursor: pointer; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg2); color: var(--text); display: flex; justify-content: space-between; align-items: center; gap: 6px; width: 100%; text-align: left; font-family: var(--font-body); transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .hint-btn:hover:not(:disabled) { background: var(--bg3); border-color: var(--border-light); }
  .hint-btn:active:not(:disabled) { transform: scale(0.97); }
  .hint-btn:disabled { opacity: 0.3; cursor: default; }
  .cost-pill { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; font-family: var(--font-pixel); }
  .cost-low { background:#1a2e10; color:#7ec850; border:1px solid #3a5a20; }
  .cost-mid { background:#2e1e10; color:#e8a040; border:1px solid #5a3a20; }
  .cost-high { background:#2e1010; color:#e85050; border:1px solid #5a2020; }
  .type-pill { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; margin:2px 2px 2px 0; text-transform:capitalize; letter-spacing:.03em; }
  .stat-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
  .stat-bar-bg { background:var(--bg4); border-radius:4px; height:5px; flex:1; min-width:60px; }
  .stat-fill { height:5px; border-radius:4px; transition:width 0.4s ease; }
  .input-wrap { position: relative; }
  #guess-input { width:100%; padding:11px 14px; font-size:14px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); color:var(--text); font-family:var(--font-body); transition:border-color 0.2s, box-shadow 0.2s; outline:none; }
  #guess-input:focus { border-color:var(--yellow); box-shadow:0 0 0 2px #FFCB0522; }
  #guess-input::placeholder { color:var(--text3); }
  #ac-list { background:var(--bg2); border:1px solid var(--border-light); border-radius:var(--radius); margin-top:3px; display:none; max-height:160px; overflow-y:auto; position:absolute; width:100%; z-index:10; box-shadow:0 8px 24px #00000066; }
  .ac-item { padding:8px 14px; font-size:13px; cursor:pointer; color:var(--text); font-family:var(--font-body); border-bottom:1px solid var(--border); transition:background 0.1s; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:hover { background:var(--bg3); }
  .guess-actions { display:grid; grid-template-columns:1fr auto; gap:6px; margin-top:7px; }
  .btn-submit { padding:10px 16px; font-size:12px; cursor:pointer; border-radius:var(--radius); border:1px solid var(--yellow); background:linear-gradient(135deg,#2a2000,#1a1500); color:var(--yellow); font-family:var(--font-pixel); letter-spacing:.05em; transition:background 0.15s, box-shadow 0.15s, transform 0.1s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-submit:hover { background:linear-gradient(135deg,#3a3000,#2a2000); box-shadow:0 0 12px #FFCB0533; }
  .btn-submit:active { transform:scale(0.97); }
  .btn-giveup { padding:10px 16px; font-size:11px; cursor:pointer; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); color:var(--text3); font-family:var(--font-body); transition:background 0.15s, border-color 0.15s, color 0.15s; }
  .btn-giveup:hover { border-color:var(--danger); color:var(--danger); background:var(--danger-bg); }
  #guess-feedback { margin-top:7px; font-size:12px; min-height:18px; text-align:center; font-family:var(--font-pixel); letter-spacing:.04em; line-height:1.8; }
  #result-area { display:none; margin-top:18px; }
  #result-banner { border-radius:var(--radius-lg); padding:24px 20px; text-align:center; border:1px solid var(--border); position:relative; overflow:hidden; }
  #result-banner.won { background:var(--success-bg); border-color:var(--success); box-shadow:0 0 30px #2ecc7133; }
  #result-banner.lost { background:var(--danger-bg); border-color:var(--danger); box-shadow:0 0 30px #e74c3c33; }
  #pksprite { width:120px; height:120px; image-rendering:pixelated; display:block; margin:0 auto 10px; filter:drop-shadow(0 0 12px #ffffff44); animation:floatAnim 3s ease-in-out infinite; }
  @keyframes floatAnim { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  #result-name { font-family:var(--font-pixel); font-size:14px; color:var(--text); margin-bottom:6px; line-height:1.6; }
  #result-score { font-size:12px; color:var(--text2); margin-bottom:16px; line-height:1.6; }
  .btn-new { padding:11px 22px; font-size:10px; cursor:pointer; border-radius:var(--radius); border:1px solid var(--yellow); background:linear-gradient(135deg,#2a2000,#1a1500); color:var(--yellow); font-family:var(--font-pixel); letter-spacing:.06em; transition:background 0.15s, box-shadow 0.15s; display:inline-flex; align-items:center; gap:8px; }
  .btn-new:hover { background:linear-gradient(135deg,#3a3000,#2a2000); box-shadow:0 0 16px #FFCB0544; }
  .play-cry-btn { padding:6px 14px; font-size:11px; cursor:pointer; border-radius:var(--radius); border:1px solid var(--border-light); background:var(--bg3); color:var(--text); font-family:var(--font-body); transition:background 0.15s; }
  .play-cry-btn:hover { background:var(--bg4); }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:10px; }
</style>
</head>
<body>
<header class="game-header">
  <div class="header-logo" id="header-logo">WHO'S THAT<br><span>POKÉMON?</span></div>
  <div class="header-right">
    <div class="lang-select-wrap">
      <button class="lang-btn" onclick="toggleLangDropdown()">
        <span id="lang-btn-flag">🇬🇧</span>
        <span id="lang-btn-label">EN</span>
        <span class="lang-arrow">▾</span>
      </button>
      <div class="lang-dropdown" id="lang-dropdown">
        <div class="lang-option active" data-lang="en"      data-flag="🇬🇧" data-label="EN" onclick="selectLang(this)"><span>🇬🇧</span><span>EN</span><span class="lang-native">English</span></div>
        <div class="lang-option"        data-lang="es"      data-flag="🇪🇸" data-label="ES" onclick="selectLang(this)"><span>🇪🇸</span><span>ES</span><span class="lang-native">Español</span></div>
        <div class="lang-option"        data-lang="fr"      data-flag="🇫🇷" data-label="FR" onclick="selectLang(this)"><span>🇫🇷</span><span>FR</span><span class="lang-native">Français</span></div>
        <div class="lang-option"        data-lang="de"      data-flag="🇩🇪" data-label="DE" onclick="selectLang(this)"><span>🇩🇪</span><span>DE</span><span class="lang-native">Deutsch</span></div>
        <div class="lang-option"        data-lang="it"      data-flag="🇮🇹" data-label="IT" onclick="selectLang(this)"><span>🇮🇹</span><span>IT</span><span class="lang-native">Italiano</span></div>
        <div class="lang-option"        data-lang="ja"      data-flag="🇯🇵" data-label="JA" onclick="selectLang(this)"><span>🇯🇵</span><span>JA</span><span class="lang-native">日本語</span></div>
        <div class="lang-option"        data-lang="ko"      data-flag="🇰🇷" data-label="KO" onclick="selectLang(this)"><span>🇰🇷</span><span>KO</span><span class="lang-native">한국어</span></div>
        <div class="lang-option"        data-lang="zh-Hans" data-flag="🇨🇳" data-label="ZH" onclick="selectLang(this)"><span>🇨🇳</span><span>ZH</span><span class="lang-native">中文</span></div>
      </div>
    </div>
    <div class="header-dots">
      <div class="header-dot"></div><div class="header-dot"></div><div class="header-dot"></div>
    </div>
  </div>
</header>

<div class="game-wrap">
  <div id="loading">
    <div class="load-pokeball"></div>
    <div id="load-msg"></div>
    <div id="load-sub"></div>
  </div>
  <div id="game" style="display:none;">
    <div class="score-bar">
      <div class="score-card"><div class="slabel" id="lbl-pts"></div><div class="sval red" id="pts">0</div></div>
      <div class="score-card"><div class="slabel" id="lbl-hints"></div><div class="sval yellow" id="hcount">0</div></div>
      <div class="score-card"><div class="slabel" id="lbl-wrong"></div><div class="sval blue" id="wrongs">0</div></div>
    </div>
    <div id="revealed-list"></div>
    <div class="section-label" id="lbl-hints-section"></div>
    <div id="btn-grid"></div>
    <div class="section-label" id="lbl-guess-section" style="margin-top:20px;"></div>
    <div class="input-wrap">
      <input type="text" id="guess-input" autocomplete="off"/>
      <div id="ac-list"></div>
    </div>
    <div class="guess-actions">
      <button class="btn-submit" id="btn-submit" onclick="submitGuess()"></button>
      <button class="btn-giveup" id="btn-giveup" onclick="giveUp()"></button>
    </div>
    <div id="guess-feedback"></div>
    <div id="result-area">
      <div id="result-banner">
        <img id="pksprite" src="" alt=""/>
        <div id="result-name"></div>
        <div id="result-score"></div>
        <button class="btn-new" id="btn-new" onclick="newGame()"></button>
      </div>
    </div>
  </div>
</div>

  {id:'evo_count',cost:5,icon:'⛓️'},{id:'bst',cost:4,icon:'📊'},
  {id:'legendary',cost:3,icon:'🏆'},{id:'egg_group',cost:5,icon:'🥚'},
  {id:'height_weight',cost:4,icon:'📏'},{id:'catch_rate',cost:3,icon:'🎯'},
  {id:'base_friendship',cost:3,icon:'💛'},{id:'growth_rate',cost:3,icon:'📉'},
  {id:'gender_ratio',cost:4,icon:'⚥'},{id:'base_exp',cost:4,icon:'⭐'},
  {id:'ev_yield',cost:5,icon:'💪'},{id:'genus',cost:9,icon:'🏷️'},
  {id:'cry',cost:12,icon:'🔊'},{id:'flavor',cost:14,icon:'📖'},
  {id:'silhouette',cost:20,icon:'👤'},
];

let currentLang='en';
let pkData=null,pkSpecies=null,pkEvoChain=null,typeData={};
let usedPts=0,hintsTaken=0,wrongGuesses=0,revealed=new Set();
let allPokemon=[],totalCount=0;
let flavorCache={};   // lang -> {text, version}
let scrambledCache=null;
let startTime=0,gameOver=false,lastResultWon=false,lastScoreData=null;

function cpClass(c){return c<=6?'cost-low':c<=11?'cost-mid':'cost-high';}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function capWords(s){return s?s.split(/[-_ ]/).map(cap).join(' '):'';}

// ─── Language ─────────────────────────────────────────────────────────────────
function toggleLangDropdown(){document.getElementById('lang-dropdown').classList.toggle('open');}
document.addEventListener('click',e=>{
  const w=document.querySelector('.lang-select-wrap');
  if(w&&!w.contains(e.target))document.getElementById('lang-dropdown').classList.remove('open');
});

function selectLang(el){
  const lang=el.dataset.lang;
  if(lang===currentLang){document.getElementById('lang-dropdown').classList.remove('open');return;}
  currentLang=lang;
  document.getElementById('lang-btn-flag').textContent=el.dataset.flag;
  document.getElementById('lang-btn-label').textContent=el.dataset.label;
  document.querySelectorAll('.lang-option').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('lang-dropdown').classList.remove('open');
  applyI18n();
  if(pkData){rerenderRevealedHints();}
  if(gameOver){rerenderResult();}
}

function applyI18n(){
  // Header
  //const logo=document.getElementById('header-logo');
  //logo.innerHTML=`${t('header_line1')}<br><span>${t('header_line2')}</span>`;
  // Static labels
  document.getElementById('lbl-pts').textContent=t('pts_label');
  document.getElementById('lbl-hints').textContent=t('hints_label');
  document.getElementById('lbl-wrong').textContent=t('wrong_label');
  document.getElementById('lbl-hints-section').textContent=t('hints_section');
  document.getElementById('lbl-guess-section').textContent=t('guess_section');
  document.getElementById('guess-input').placeholder=t('input_ph');
  document.getElementById('btn-submit').textContent=t('submit_btn');
  document.getElementById('btn-giveup').textContent=t('giveup_btn');
  document.getElementById('btn-new').textContent=t('new_btn');
  // Re-render hint buttons
  if(pkData)renderButtons();
}

function rerenderRevealedHints(){
  document.querySelectorAll('.revealed-row').forEach(row=>{
    const id=row.dataset.hintId; if(!id)return;
    const h=HINT_IDS.find(x=>x.id===id); if(!h)return;
    const lbl=row.querySelector('.revealed-label');
    const val=row.querySelector('.revealed-value');
    if(lbl)lbl.innerHTML=`${h.icon} ${t('h_'+id)}`;
    // Re-render value only for language-dependent hints
    if(val&&['first_letter','scrambled','flavor','legendary','gender_ratio','evolution_stage',
              'evo_method_to','evo_method_from','evo_count','weaknesses','resistances',
              'habitat','genus'].includes(id)){
      if(id==='flavor'){
        // async: show cached if available
        const cached=flavorCache[currentLang];
        if(cached)val.innerHTML=`<span style="font-size:12px;color:var(--text);font-style:italic;line-height:1.6;">(${cached.version}) "${cached.text}"</span>`;
        else{
          val.innerHTML=`<span style="color:var(--text3);font-size:12px;">Loading...</span>`;
          getFlavorHint(currentLang).then(fh=>{
            val.innerHTML=`<span style="font-size:12px;color:var(--text);font-style:italic;line-height:1.6;">(${fh.version}) "${fh.text}"</span>`;
          });
        }
      } else {
        val.innerHTML=getHintHTML(id);
      }
    }
  });
}

function rerenderResult(){
  if(!pkData||!pkSpecies)return;
  const loc=getLocalizedName(currentLang);
  const en=pkSpecies.names?.find(n=>n.language.name==='en')?.name||cap(pkData.name);
  let nameStr=loc;
  if(currentLang!=='en'&&loc!==en)nameStr+=` (${en})`;
  if(!lastResultWon)nameStr+=' '+t('giveup_result');
  document.getElementById('result-name').textContent=nameStr;
  document.getElementById('btn-new').textContent=t('new_btn');
  if(lastResultWon&&lastScoreData){
    const{finalScore,ht,wg,timeTaken}=lastScoreData;
    document.getElementById('result-score').textContent=t('score_line',Math.round(finalScore),ht,wg,Math.round(timeTaken),getRating(finalScore));
  } else if(!lastResultWon){
    document.getElementById('result-score').textContent=t('better_luck');
  }
}

function getRating(s){
  return s>=900?t('rank_master'):s>=750?t('rank_elite'):s>=600?t('rank_gym'):s>=450?t('rank_trainer'):t('rank_beginner');
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function fetchJSON(url){const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function loadAllPokemon(){
  const res=await fetchJSON('https://pokeapi.co/api/v2/pokemon-species?limit=10000');
  totalCount=res.count;allPokemon=res.results;
  document.getElementById('load-sub').textContent=`${totalCount} Pokémon loaded`;
}
async function loadTypeChart(){
  const res=await fetchJSON('https://pokeapi.co/api/v2/type?limit=100');
  const types=res.results.map(x=>x.name).filter(x=>x!=='unknown'&&x!=='shadow');
  await Promise.all(types.map(async tn=>{const td=await fetchJSON(`https://pokeapi.co/api/v2/type/${tn}`);typeData[tn]=td.damage_relations;}));
}
function calcDefenses(typeNames){
  const m={};Object.keys(TYPE_COLORS).forEach(x=>m[x]=1);
  typeNames.forEach(dt=>{
    const r=typeData[dt];if(!r)return;
    r.double_damage_from?.forEach(x=>m[x.name]=(m[x.name]||1)*2);
    r.half_damage_from?.forEach(x=>m[x.name]=(m[x.name]||1)*0.5);
    r.no_damage_from?.forEach(x=>m[x.name]=(m[x.name]||1)*0);
  });
  return m;
}
function getLocalizedName(lang){
  const e=pkSpecies.names?.find(n=>n.language.name===lang);
  if(e)return e.name;
  const en=pkSpecies.names?.find(n=>n.language.name==='en');
  return en?.name||cap(pkData.name);
}
async function getFlavorHint(lang){
  if(flavorCache[lang])return flavorCache[lang];
  const pool=pkSpecies.flavor_text_entries.filter(f=>f.language.name===lang);
  const src=pool.length?pool:pkSpecies.flavor_text_entries.filter(f=>f.language.name==='en');
  if(!src.length){flavorCache[lang]={text:t('not_found'),version:''};return flavorCache[lang];}
  const entry=src[Math.floor(Math.random()*src.length)];
  let text=entry.flavor_text.replace(/\f|\n|\r/g,' ');
  [pkSpecies.name,getLocalizedName('en'),getLocalizedName(lang)].filter(Boolean).forEach(n=>{
    text=text.replace(new RegExp(n,'gi'),'___');
  });
  try{
    const vd=await fetchJSON(entry.version.url);
    const vn=vd.names.find(n=>n.language.name===lang)?.name||vd.names.find(n=>n.language.name==='en')?.name||capWords(vd.name);
    flavorCache[lang]={text,version:vn};
  }catch{flavorCache[lang]={text,version:''};}
  return flavorCache[lang];
}

// ─── Game ─────────────────────────────────────────────────────────────────────
async function newGame(){
  document.getElementById('game').style.display='none';
  document.getElementById('loading').style.display='flex';
  document.getElementById('result-area').style.display='none';
  document.getElementById('revealed-list').innerHTML='';
  document.getElementById('guess-input').value='';
  document.getElementById('guess-feedback').textContent='';
  document.getElementById('ac-list').style.display='none';
  revealed=new Set();usedPts=0;hintsTaken=0;wrongGuesses=0;gameOver=false;lastScoreData=null;
  flavorCache={};scrambledCache=null;
  updateScores();
  try{
    document.getElementById('load-msg').textContent=t('load_dex');
    if(!allPokemon.length)await Promise.all([loadAllPokemon(),loadTypeChart()]);
    document.getElementById('load-msg').textContent=t('load_random');
    const pick=allPokemon[Math.floor(Math.random()*allPokemon.length)];
    pkSpecies=await fetchJSON(`https://pokeapi.co/api/v2/pokemon-species/${pick.name}`);
    pkData=await fetchJSON(`https://pokeapi.co/api/v2/pokemon/${pkSpecies.id}`);
    pkEvoChain=await fetchJSON(pkSpecies.evolution_chain.url);
    applyI18n();
    renderButtons();
    document.getElementById('loading').style.display='none';
    document.getElementById('game').style.display='block';
    startTime=Date.now();
  }catch(e){
    document.getElementById('load-msg').textContent=t('load_error');
    setTimeout(newGame,2000);
  }
}

function updateScores(){
  document.getElementById('pts').textContent=usedPts;
  document.getElementById('hcount').textContent=hintsTaken;
  document.getElementById('wrongs').textContent=wrongGuesses;
}

function renderButtons(){
  const grid=document.getElementById('btn-grid');
  grid.innerHTML='';
  HINT_IDS.forEach(h=>{
    const btn=document.createElement('button');
    btn.className='hint-btn';btn.id='btn-'+h.id;
    btn.disabled=revealed.has(h.id);
    btn.innerHTML=`<span style="font-size:11px;">${h.icon} ${t('h_'+h.id)}</span><span class="cost-pill ${cpClass(h.cost)}">-${h.cost}pts</span>`;
    btn.onclick=()=>revealHint(h);
    grid.appendChild(btn);
  });
}

async function revealHint(h){
  if(revealed.has(h.id))return;
  revealed.add(h.id);usedPts+=h.cost;hintsTaken++;
  updateScores();
  document.getElementById('btn-'+h.id).disabled=true;
  const val=h.id==='flavor'
    ?await(async()=>{const fh=await getFlavorHint(currentLang);return`<span style="font-size:12px;color:var(--text);font-style:italic;line-height:1.6;">(${fh.version}) "${fh.text}"</span>`;})()
    :getHintHTML(h.id);
  const list=document.getElementById('revealed-list');
  const div=document.createElement('div');
  div.className='revealed-row';div.dataset.hintId=h.id;
  div.innerHTML=`<span class="revealed-label">${h.icon} ${t('h_'+h.id)}</span><div class="revealed-value" style="text-align:right;flex:1;">${val}</div>`;
  list.prepend(div);
}

function typePill(name){const c=TYPE_COLORS[name]||'#888';return`<span class="type-pill" style="background:${c}25;color:${c};border:1px solid ${c}55;">${cap(name)}</span>`;}
function getEvoStage(){
  const s=[];
  function w(node,d){s.push({name:node.species.name,depth:d,detailsTo:node.evolution_details,children:node.evolves_to});node.evolves_to.forEach(n=>w(n,d+1));}
  w(pkEvoChain.chain,0);
  const me=s.find(x=>x.name===pkSpecies.name);
  return{stage:me?(me.depth+1):1,total:Math.max(...s.map(x=>x.depth))+1,detailsTo:me?me.detailsTo:[],childrenNodes:me?me.children:[]};
}
function buildEvoParts(d){
  const p=[];
  if(d.trigger?.name==='level-up'){if(d.min_level)p.push(`${t('lv')} ${d.min_level}`);else p.push(t('level_up'));}
  else if(d.trigger?.name==='use-item'&&d.item)p.push(`${t('use_item')} ${capWords(d.item.name)}`);
  else if(d.trigger?.name==='trade')p.push(t('trade')+(d.held_item?` ${t('trade_holding')} ${capWords(d.held_item.name)}`:''));
  else if(d.trigger)p.push(capWords(d.trigger.name));
  if(d.min_happiness)p.push(`${t('high_friend')} (≥${d.min_happiness})`);
  if(d.time_of_day)p.push(`${t('during')} ${d.time_of_day}`);
  if(d.known_move)p.push(`${t('knowing')} ${capWords(d.known_move.name)}`);
  if(d.location)p.push(`${t('at_loc')} ${capWords(d.location.name)}`);
  if(d.held_item&&d.trigger?.name!=='trade')p.push(`${t('holding')} ${capWords(d.held_item.name)}`);
  if(d.min_beauty)p.push(t('high_beauty'));
  if(d.needs_overworld_rain)p.push(t('in_rain'));
  if(d.turn_upside_down)p.push(t('upside_down'));
  if(d.gender===1)p.push(t('female'));if(d.gender===2)p.push(t('male'));
  return p;
}

function getHintHTML(id){
  const pk=pkData,sp=pkSpecies;
  switch(id){
    case 'dex_number':return`<span style="font-size:14px;font-weight:600;">#${pk.id}</span>`;
    case 'generation':return`<span style="font-size:13px;font-weight:600;">Gen ${sp.generation.name.replace('generation-','').toUpperCase()}</span>`;
    case 'legendary':{
      const s=sp.is_legendary?t('legendary'):sp.is_mythical?t('mythical'):t('regular');
      const c=sp.is_legendary||sp.is_mythical?'var(--yellow)':'var(--text2)';
      return`<span style="font-size:13px;color:${c};font-weight:600;">${s}</span>`;
    }
    case 'color':return`<span style="font-size:13px;">${capWords(sp.color.name)}</span>`;
    case 'shape':return`<span style="font-size:13px;">${sp.shape?capWords(sp.shape.name):t('unknown')}</span>`;
    case 'evolution_stage':{
      const{stage,total}=getEvoStage();
      const labels=t('stage_labels');
      return`<span style="font-size:13px;">${labels[stage]||'Stage '+stage} (${stage}/${total}${total===1?' '+t('standalone'):''})</span>`;
    }
    case 'evo_method_to':{
      const{detailsTo}=getEvoStage();
      if(!detailsTo?.length)return`<span style="font-size:13px;color:var(--text2);">${t('base_form')}</span>`;
      const p=buildEvoParts(detailsTo[0]);
      return`<span style="font-size:13px;">${p.join(' + ')||t('evo_special')}</span>`;
    }
    case 'evo_method_from':{
      const{childrenNodes}=getEvoStage();
      if(!childrenNodes?.length)return`<span style="font-size:13px;color:var(--text2);">${t('final_form')}</span>`;
      return childrenNodes.map(ch=>{
        const details=ch.evolution_details||[];
        if(!details.length)return`<span style="font-size:13px;color:var(--text2);">${t('evo_special')}</span>`;
        const p=buildEvoParts(details[0]);
        return`<span style="font-size:13px;">${p.join(' + ')||t('evo_special')}</span>`;
      }).join('<br>');
    }
    case 'bst':{const b=pk.stats.reduce((s,x)=>s+x.base_stat,0);return`<span style="font-size:15px;font-weight:700;">${b}</span>`;}
    case 'type':return pk.types.map(x=>typePill(x.type.name)).join('');
    case 'weaknesses':{
      const m=calcDefenses(pk.types.map(x=>x.type.name));
      const x4=Object.entries(m).filter(([,v])=>v===4).map(([k])=>k);
      const x2=Object.entries(m).filter(([,v])=>v===2).map(([k])=>k);
      let o='';
      if(x4.length)o+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">×4 </span>`+x4.map(typePill).join('')+'</div>';
      if(x2.length)o+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">×2 </span>`+x2.map(typePill).join('')+'</div>';
      return o||`<span style="font-size:13px;color:var(--text2);">${t('no_weakness')}</span>`;
    }
    case 'resistances':{
      const m=calcDefenses(pk.types.map(x=>x.type.name));
      const q=Object.entries(m).filter(([,v])=>v===0.25).map(([k])=>k);
      const h=Object.entries(m).filter(([,v])=>v===0.5).map(([k])=>k);
      const i=Object.entries(m).filter(([,v])=>v===0).map(([k])=>k);
      let o='';
      if(i.length)o+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">×0 </span>`+i.map(typePill).join('')+'</div>';
      if(q.length)o+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">¼ </span>`+q.map(typePill).join('')+'</div>';
      if(h.length)o+=`<div style="margin-bottom:3px;"><span style="font-size:10px;color:var(--text3);">½ </span>`+h.map(typePill).join('')+'</div>';
      return o||`<span style="font-size:13px;color:var(--text2);">${t('no_resist')}</span>`;
    }
    case 'stats':{
      const names={hp:'HP',attack:'Atk',defense:'Def','special-attack':'SpA','special-defense':'SpD',speed:'Spe'};
      return pk.stats.map(s=>{
        const pct=Math.round(s.base_stat/255*100);
        const c=s.base_stat>=100?'#7ec850':s.base_stat>=60?'#e8a040':'#e85050';
        return`<div class="stat-row"><span style="font-size:10px;color:var(--text3);min-width:26px;">${names[s.stat.name]||s.stat.name}</span><div class="stat-bar-bg"><div class="stat-fill" style="width:${pct}%;background:${c};"></div></div><span style="font-size:11px;min-width:24px;text-align:right;">${s.base_stat}</span></div>`;
      }).join('');
    }
    case 'abilities':return pk.abilities.map(a=>`<span style="font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:3px 9px;display:inline-block;margin:2px;">${capWords(a.ability.name)}${a.is_hidden?` <span style="font-size:9px;color:var(--text3);">(H)</span>`:''}</span>`).join('');
    case 'egg_group':return sp.egg_groups.map(e=>`<span style="font-size:13px;">${capWords(e.name)}</span>`).join(', ');
    case 'height_weight':return`<span style="font-size:13px;">${(pk.height/10).toFixed(1)} m / ${(pk.weight/10).toFixed(1)} kg</span>`;
    case 'catch_rate':{const r=sp.capture_rate;return`<span style="font-size:13px;">${r}/255 (~${((r/255)*100).toFixed(1)}% at full HP)</span>`;}
    case 'base_friendship':return`<span style="font-size:13px;">${sp.base_happiness??'—'}/255</span>`;
    case 'growth_rate':return`<span style="font-size:13px;">${capWords(sp.growth_rate.name)}</span>`;
    case 'genus':{
      const g=sp.genera?.find(x=>x.language.name===currentLang)||sp.genera?.find(x=>x.language.name==='en');
      return`<span style="font-size:13px;">${g?g.genus:t('unknown')}</span>`;
    }
    case 'region':{
      const rm={'i':1,'ii':2,'iii':3,'iv':4,'v':5,'vi':6,'vii':7,'viii':8,'ix':9};
      const regions={1:'Kanto',2:'Johto',3:'Hoenn',4:'Sinnoh',5:'Unova',6:'Kalos',7:'Alola',8:'Galar',9:'Paldea'};
      return`<span style="font-size:13px;">${regions[rm[sp.generation.name.replace('generation-','')]]||capWords(sp.generation.name)}</span>`;
    }
    case 'gender_ratio':{
      if(sp.gender_rate===-1)return`<span style="font-size:13px;">${t('genderless')}</span>`;
      const f=Math.round(sp.gender_rate/8*100);
      return`<span style="font-size:13px;">♂ ${100-f}% / ♀ ${f}%</span>`;
    }
    case 'cry':{
      const cryUrl=`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${pk.id}.ogg`;
      const legUrl=`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/legacy/${pk.id}.ogg`;
      const bid='cry-btn-'+pk.id;
      setTimeout(()=>{
        const btn=document.getElementById(bid);
        if(btn)btn.onclick=()=>{
          btn.textContent=t('playing_cry');
          const a=new Audio(cryUrl);
          a.play().catch(()=>{const b=new Audio(legUrl);b.play().catch(()=>{btn.textContent=t('no_cry');});b.onended=()=>{btn.textContent=t('play_again');};});
          a.onended=()=>{btn.textContent=t('play_again');};
        };
      },100);
      return`<button class="play-cry-btn" id="${bid}">${t('play_cry')}</button>`;
    }
    case 'habitat':return`<span style="font-size:13px;">${sp.habitat?capWords(sp.habitat.name):`<span style="color:var(--text3);">${t('no_habitat')}</span>`}</span>`;
    case 'base_exp':return`<span style="font-size:13px;">${pk.base_experience??'—'} XP</span>`;
    case 'ev_yield':{
      const y=pk.stats.filter(s=>s.effort>0).map(s=>`+${s.effort} ${({hp:'HP',attack:'Atk',defense:'Def','special-attack':'SpA','special-defense':'SpD',speed:'Spe'})[s.stat.name]||s.stat.name}`);
      return`<span style="font-size:13px;">${y.join(', ')||t('none')}</span>`;
    }
    case 'first_letter':{const n=getLocalizedName(currentLang);return`<span style="font-size:14px;font-weight:600;">${n[0].toUpperCase()}</span>`;}
    case 'scrambled':{
      if(!scrambledCache){const n=getLocalizedName('en');scrambledCache=n.split('').sort(()=>Math.random()-0.5).join('');}
      return`<span style="font-size:13px;">${scrambledCache}</span>`;
    }
    case 'evo_count':{
      let c=0;function w(n){if(n.evolves_to.length){c+=n.evolves_to.length;n.evolves_to.forEach(w);}}
      w(pkEvoChain.chain);return`<span style="font-size:13px;">${t('evo_chain',c)}</span>`;
    }
    case 'silhouette':{
      const img=pk.sprites.other?.['official-artwork']?.front_default||pk.sprites.front_default;
      return`<img src="${img}" style="width:100px;image-rendering:pixelated;filter:brightness(0) invert(1);opacity:0.9;">`;
    }
    default:return'—';
  }
}

// ─── Guess ────────────────────────────────────────────────────────────────────
function submitGuess(){
  const raw=document.getElementById('guess-input').value.trim();if(!raw)return;
  const v=raw.toLowerCase();
  const api=pkData.name.toLowerCase();
  const en=(pkSpecies.names?.find(n=>n.language.name==='en')?.name||cap(pkData.name)).toLowerCase();
  const loc=getLocalizedName(currentLang).toLowerCase();
  if(v===api||v===en||v===loc||v.replace(/\s+/g,'-')===api){showResult(true);}
  else{
    wrongGuesses++;updateScores();
    const fb=document.getElementById('guess-feedback');
    fb.style.color='var(--danger)';fb.textContent=t('wrong_fb');
    setTimeout(()=>{fb.textContent='';},2200);
  }
}
function giveUp(){showResult(false);}
function showResult(won){
  gameOver=true;lastResultWon=won;
  const loc=getLocalizedName(currentLang);
  const en=pkSpecies.names?.find(n=>n.language.name==='en')?.name||cap(pkData.name);
  let nameStr=loc;
  if(currentLang!=='en'&&loc!==en)nameStr+=` (${en})`;
  if(!won)nameStr+=' '+t('giveup_result');
  document.getElementById('pksprite').src=pkData.sprites.other?.['official-artwork']?.front_default||pkData.sprites.front_default||'';
  document.getElementById('result-name').textContent=nameStr;
  if(!won){
    document.getElementById('result-score').textContent=t('better_luck');
    lastScoreData=null;
  } else {
    const timeTaken=(Date.now()-startTime)/1000;
    const hp=usedPts*10;
    let wp=0;for(let i=1;i<=wrongGuesses;i++)wp+=i*25;
    const tp=Math.min(timeTaken*2,200);
    const eb=hintsTaken===0?200:hintsTaken<=2?120:hintsTaken<=4?60:0;
    const rb=wrongGuesses===0?100:wrongGuesses===1?50:0;
    const fs=Math.max(0,1000-hp-wp-tp+eb+rb);
    lastScoreData={finalScore:fs,ht:hintsTaken,wg:wrongGuesses,timeTaken};
    document.getElementById('result-score').textContent=t('score_line',Math.round(fs),hintsTaken,wrongGuesses,Math.round(timeTaken),getRating(fs));
  }
  const banner=document.getElementById('result-banner');
  banner.className='';banner.id='result-banner';
  banner.classList.add(won?'won':'lost');
  document.getElementById('result-area').style.display='block';
  document.getElementById('guess-feedback').textContent='';
  document.getElementById('btn-new').textContent=t('new_btn');
}

// ─── Autocomplete ─────────────────────────────────────────────────────────────
const gInput=document.getElementById('guess-input');
const acList=document.getElementById('ac-list');
gInput.addEventListener('input',()=>{
  const q=gInput.value.toLowerCase().replace(/\s+/g,'-');
  acList.innerHTML='';
  if(!q||q.length<2){acList.style.display='none';return;}
  const matches=allPokemon.filter(p=>p.name.startsWith(q)).slice(0,7);
  if(!matches.length){acList.style.display='none';return;}
  matches.forEach(m=>{
    const d=document.createElement('div');d.className='ac-item';
    d.textContent=capWords(m.name);
    d.onclick=()=>{gInput.value=capWords(m.name);acList.style.display='none';};
    acList.appendChild(d);
  });
  acList.style.display='block';
});
gInput.addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});
document.addEventListener('click',e=>{if(!gInput.contains(e.target)&&!acList.contains(e.target))acList.style.display='none';});

// ─── Boot ─────────────────────────────────────────────────────────────────────
applyI18n();
newGame();
</script>
